<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capability Lens — facilit8</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
/* ── Design tokens ── */
:root {
  --f8-blue:#0070C0; --f8-blue-bright:#0090E7; --f8-blue-deep:#005896; --f8-blue-tint:#E8F4FC;
  --f8-navy:#0A1628; --f8-navy-2:#142238;
  --f8-teal:#007B8A; --f8-teal-tint:#E6F4F6;
  --f8-amber:#B86A00; --f8-amber-tint:#FFF4E0;
  --f8-green:#1A6B3A; --f8-green-tint:#EAF6EE;
  --f8-purple:#5B3FA6; --f8-purple-tint:#F2EFFF;
  --f8-rose:#9B1D4A; --f8-rose-tint:#FCEEF4;
  --f8-red:#C0392B; --f8-red-tint:#FDEEEC;
  --f8-slate:#3D5166; --f8-slate-tint:#EDF1F5;
  --f8-off-white:#F5F7FA; --f8-fog:#E6ECF2; --f8-mist:#C9D2DD;
  --f8-grey:#6B7A99; --f8-ink:#1A1A2E; --f8-ink-soft:#3A3F55;
  --font-sans:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --r-sm:6px; --r-md:8px; --r-lg:12px; --r-xl:16px;
  --shadow-1:0 1px 3px rgba(10,22,40,0.06);
  --shadow-2:0 4px 16px rgba(10,22,40,0.08),0 1px 3px rgba(10,22,40,0.04);
  --shadow-3:0 8px 32px rgba(10,22,40,0.12),0 2px 8px rgba(10,22,40,0.06);
  --dur:0.18s; --ease-out:cubic-bezier(0.2,0,0,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);background:var(--f8-off-white);color:var(--f8-ink);-webkit-font-smoothing:antialiased;}

/* ── App shell ── */
.app-shell{min-height:100vh;display:flex;flex-direction:column;}
main{flex:1;}

/* ── App Nav ── */
.app-nav{
  position:sticky;top:0;z-index:50;
  background:rgba(255,255,255,0.92);
  backdrop-filter:saturate(160%) blur(10px);
  -webkit-backdrop-filter:saturate(160%) blur(10px);
  border-bottom:1px solid var(--f8-fog);
}
.app-nav-inner{
  max-width:1100px;margin:0 auto;padding:0 24px;
  display:flex;align-items:center;gap:24px;height:64px;
}
.app-nav-logo{font-size:17px;font-weight:800;color:var(--f8-navy);letter-spacing:-0.02em;text-decoration:none;display:flex;align-items:center;gap:10px;line-height:1;}
.app-nav-sub{font-size:13px;color:var(--f8-grey);font-weight:500;flex:1;}
.plan-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:4px 10px;border-radius:20px;cursor:pointer;transition:all var(--dur) var(--ease-out);}
.plan-badge.basic{background:var(--f8-slate-tint);color:var(--f8-slate);border:1px solid var(--f8-mist);}
.plan-badge.premium{background:linear-gradient(135deg,#f0e8ff,#e8f4fc);color:var(--f8-purple);border:1px solid #c9bff0;}

/* ── Stage Bar ── */
.stage-bar{background:#fff;border-bottom:1px solid var(--f8-fog);padding:0 24px;}
.stage-bar-inner{max-width:1100px;margin:0 auto;display:flex;align-items:stretch;overflow-x:auto;scrollbar-width:none;}
.stage-bar-inner::-webkit-scrollbar{display:none;}
.stage-step{
  display:flex;align-items:center;gap:8px;padding:14px 16px;
  border-bottom:2px solid transparent;white-space:nowrap;
  font-size:13px;font-weight:500;color:var(--f8-grey);
  cursor:default;transition:all var(--dur) var(--ease-out);user-select:none;
}
.stage-step.done{color:var(--f8-green);cursor:pointer;}
.stage-step.done:hover{color:var(--f8-blue);}
.stage-step.active{color:var(--f8-navy);font-weight:600;border-bottom-color:var(--f8-blue);}
.stage-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--f8-fog);color:var(--f8-grey);flex-shrink:0;}
.stage-step.done .stage-num{background:var(--f8-green-tint);color:var(--f8-green);}
.stage-step.active .stage-num{background:var(--f8-blue);color:#fff;}
.stage-sep{color:var(--f8-mist);padding:0 4px;font-size:18px;display:flex;align-items:center;}

/* ── Page wrapper ── */
.page{max-width:900px;margin:0 auto;padding:40px 24px 80px;}

/* ── Headings ── */
.page-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--f8-blue);margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.eyebrow-dot{width:5px;height:5px;border-radius:50%;background:var(--f8-blue-bright);flex-shrink:0;}
.page-title{font-size:clamp(22px,3.5vw,32px);font-weight:800;letter-spacing:-0.02em;color:var(--f8-navy);line-height:1.2;margin-bottom:10px;}
.page-sub{font-size:15px;color:var(--f8-ink-soft);line-height:1.65;max-width:700px;}

/* ── Cards & sections ── */
.card{background:#fff;border-radius:var(--r-lg);border:1px solid var(--f8-fog);padding:24px;box-shadow:var(--shadow-1);}
.card+.card{margin-top:16px;}
.card-title{font-size:15px;font-weight:700;color:var(--f8-navy);margin-bottom:8px;}
.card-sub{font-size:13.5px;color:var(--f8-ink-soft);line-height:1.6;}

/* ── Form elements ── */
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:12px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--f8-grey);}
.field input,.field textarea,.field select{
  font-family:var(--font-sans);font-size:15px;color:var(--f8-ink);
  padding:11px 14px;border-radius:var(--r-md);
  border:1.5px solid var(--f8-mist);background:#fff;
  outline:none;transition:border-color var(--dur) var(--ease-out),box-shadow var(--dur) var(--ease-out);
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--f8-blue-bright);box-shadow:0 0 0 3px rgba(0,144,231,0.12);}
.field textarea{resize:vertical;min-height:110px;line-height:1.6;}
.field-hint{font-size:12px;color:var(--f8-grey);line-height:1.5;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:620px){.form-grid{grid-template-columns:1fr;}}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-sans);font-weight:600;font-size:15px;padding:12px 22px;border-radius:var(--r-md);border:1.5px solid transparent;cursor:pointer;transition:all var(--dur) var(--ease-out);text-decoration:none;line-height:1;}
.btn-primary{background:var(--f8-blue-bright);color:#fff;border-color:var(--f8-blue-bright);}
.btn-primary:hover{background:var(--f8-blue);border-color:var(--f8-blue);}
.btn-primary:disabled{background:var(--f8-mist);border-color:var(--f8-mist);cursor:not-allowed;color:#fff;}
.btn-ghost{background:transparent;color:var(--f8-navy);border-color:var(--f8-fog);}
.btn-ghost:hover{border-color:var(--f8-mist);background:var(--f8-off-white);}
.btn-sm{padding:8px 14px;font-size:13px;}
.btn-danger{background:var(--f8-red-tint);color:var(--f8-red);border-color:#f5c5bf;}
.btn-danger:hover{background:var(--f8-red);color:#fff;}

/* ── Badges ── */
.badge{font-size:10px;font-weight:700;letter-spacing:0.07em;padding:3px 8px;border-radius:20px;text-transform:uppercase;white-space:nowrap;display:inline-block;}
.badge-ai{background:var(--f8-blue-tint);color:var(--f8-blue-deep);}
.badge-human{background:var(--f8-green-tint);color:var(--f8-green);}
.badge-warn{background:var(--f8-amber-tint);color:var(--f8-amber);}
.badge-premium{background:linear-gradient(135deg,#f0e8ff,#e8f4fc);color:var(--f8-purple);border:1px solid #c9bff0;}
.badge-impact{background:var(--f8-purple-tint);color:var(--f8-purple);}
.badge-required{background:var(--f8-red-tint);color:var(--f8-red);}
.badge-hr{background:#eef6ff;color:var(--f8-blue-deep);border:1px solid #b3d8f4;}
.badge-commercial{background:var(--f8-rose-tint);color:var(--f8-rose);border:1px solid #f0b8ce;}
.badge-both{background:var(--f8-purple-tint);color:var(--f8-purple);border:1px solid #c9bff0;}

/* ── Notes / alerts ── */
.note{padding:11px 14px;border-radius:var(--r-md);font-size:13px;line-height:1.6;margin-top:12px;}
.note strong{font-weight:700;}
.note-green{background:var(--f8-green-tint);border-left:3px solid var(--f8-green);color:#155c30;}
.note-amber{background:var(--f8-amber-tint);border-left:3px solid var(--f8-amber);color:#7a4500;}
.note-red{background:var(--f8-red-tint);border-left:3px solid var(--f8-red);color:#8b2218;}
.note-blue{background:var(--f8-blue-tint);border-left:3px solid var(--f8-blue);color:var(--f8-blue-deep);}
.note-purple{background:var(--f8-purple-tint);border-left:3px solid var(--f8-purple);color:#3d2880;}
.note-slate{background:var(--f8-slate-tint);border-left:3px solid var(--f8-slate);color:#2c3d4f;}

/* ── Rule box ── */
.rule-box{border-radius:var(--r-lg);padding:16px 20px;margin-bottom:20px;display:flex;gap:14px;align-items:flex-start;}
.rule-box-blue{background:var(--f8-blue);}
.rule-box-navy{background:var(--f8-navy);}
.rule-box-amber{background:var(--f8-amber);}
.rule-box-green{background:var(--f8-green);}
.rule-box-icon{font-size:22px;flex-shrink:0;margin-top:1px;}
.rule-box-text{font-size:13.5px;color:#fff;line-height:1.6;}
.rule-box-text strong{font-weight:700;}

/* ── Action cards ── */
.action-card{background:#fff;border-radius:var(--r-lg);padding:18px 20px;border-left:4px solid var(--f8-blue);box-shadow:var(--shadow-1);transition:box-shadow var(--dur) var(--ease-out);position:relative;}
.action-card:hover{box-shadow:var(--shadow-2);}
.action-card.human{border-left-color:var(--f8-green);}
.action-card.protect{border-left-color:var(--f8-red);}
.action-card.account{border-left-color:var(--f8-purple);}
.action-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;}
.action-title{font-weight:600;font-size:14.5px;color:var(--f8-navy);line-height:1.3;}
.action-body{font-size:13.5px;color:#444;line-height:1.65;}
.badges{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
.actions-grid{display:grid;gap:12px;}

/* ── Skill chip list ── */
.skill-list{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.skill-item{display:flex;align-items:center;gap:10px;background:var(--f8-off-white);border-radius:var(--r-md);padding:10px 14px;border:1px solid var(--f8-fog);}
.skill-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--f8-blue);flex-shrink:0;cursor:pointer;}
.skill-item label{font-size:14px;color:var(--f8-ink);line-height:1.5;cursor:pointer;flex:1;}
.skill-item.accepted{background:var(--f8-green-tint);border-color:#b6dfc5;}
.skill-item.accepted label{color:#155c30;}

/* ── Caveat box ── */
.caveat-box{background:var(--f8-amber-tint);border:1.5px solid #e0b870;border-radius:var(--r-lg);padding:16px 18px;margin-top:20px;}
.caveat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--f8-amber);margin-bottom:6px;}
.caveat-text{font-size:13px;color:#7a4500;line-height:1.6;font-style:italic;}

/* ── Premium feature panel ── */
.premium-panel{background:linear-gradient(135deg,#f9f6ff,#f0f8ff);border:1.5px solid #d4c8f8;border-radius:var(--r-xl);padding:22px 24px;position:relative;overflow:hidden;}
.premium-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--f8-purple),var(--f8-blue-bright));}
.premium-panel-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.premium-panel-icon{font-size:20px;}
.premium-panel-title{font-size:15px;font-weight:700;color:var(--f8-navy);}
.premium-panel-sub{font-size:13px;color:var(--f8-grey);margin-top:2px;}
.premium-locked{opacity:0.55;pointer-events:none;user-select:none;filter:blur(0.8px);}

/* ── Agent diff view ── */
.diff-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.diff-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;padding:3px 9px;border-radius:20px;}
.diff-tag.before{background:#fff3cd;color:#856404;}
.diff-tag.after{background:var(--f8-green-tint);color:var(--f8-green);}
.diff-change{display:flex;gap:8px;align-items:flex-start;margin-top:10px;background:#fff;border-radius:var(--r-md);padding:10px 14px;border:1px solid var(--f8-fog);}
.diff-bullet{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}
.diff-bullet.add{background:var(--f8-green-tint);color:var(--f8-green);}
.diff-bullet.change{background:var(--f8-amber-tint);color:var(--f8-amber);}
.diff-change-text{font-size:13px;color:var(--f8-ink-soft);line-height:1.55;}

/* ── JD Preview ── */
.jd-preview{background:#fff;border:1.5px solid var(--f8-fog);border-radius:var(--r-xl);padding:32px 36px;font-size:14.5px;line-height:1.75;color:var(--f8-ink-soft);}
.jd-preview h3{font-size:15px;font-weight:700;color:var(--f8-navy);margin:20px 0 8px;text-transform:uppercase;letter-spacing:0.06em;}
.jd-preview h3:first-child{margin-top:0;}
.jd-preview p{margin-bottom:10px;}
.jd-preview ul{margin-left:20px;margin-bottom:10px;}
.jd-preview ul li{margin-bottom:4px;}
.jd-preview .jd-section{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--f8-fog);}
.jd-preview .jd-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}

/* ── Sign-off ── */
.signoff-card{background:#fff;border-radius:var(--r-lg);padding:22px 24px;border:1.5px solid var(--f8-fog);box-shadow:var(--shadow-1);transition:all var(--dur) var(--ease-out);}
.signoff-card.signed{border-color:var(--f8-green);background:var(--f8-green-tint);}
.signoff-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.signoff-avatar{width:40px;height:40px;border-radius:50%;background:var(--f8-blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;}
.signoff-avatar.commercial{background:var(--f8-rose);}
.signoff-avatar.signed{background:var(--f8-green);}
.signoff-name{font-weight:700;font-size:15px;color:var(--f8-navy);}
.signoff-role{font-size:12px;color:var(--f8-grey);margin-top:2px;}

/* ── Equal treatment checklist ── */
.et-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:var(--r-md);border:1.5px solid var(--f8-fog);background:#fff;transition:all var(--dur) var(--ease-out);}
.et-item.checked{border-color:var(--f8-green);background:var(--f8-green-tint);}
.et-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--f8-green);margin-top:2px;flex-shrink:0;cursor:pointer;}
.et-item label{font-size:13.5px;color:var(--f8-ink);line-height:1.5;cursor:pointer;}
.et-item.checked label{color:#155c30;}
.et-list{display:flex;flex-direction:column;gap:8px;}

/* ── Loading state ── */
.ai-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;gap:16px;text-align:center;}
.ai-spinner{width:36px;height:36px;border:3px solid var(--f8-blue-tint);border-top-color:var(--f8-blue);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.ai-loading-label{font-size:14px;color:var(--f8-grey);font-weight:500;}
.ai-loading-model{font-size:11px;color:var(--f8-blue);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;margin-top:-8px;}

/* ── Section headers ── */
.section-hdr{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid var(--f8-navy);}
.section-icon-box{width:40px;height:40px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:var(--f8-navy);}
.section-icon-box.blue{background:var(--f8-blue);}
.section-icon-box.green{background:var(--f8-green);}
.section-icon-box.purple{background:var(--f8-purple);}
.section-icon-box.rose{background:var(--f8-rose);}
.section-title{font-size:19px;font-weight:700;color:var(--f8-navy);margin-bottom:3px;letter-spacing:-0.01em;}
.section-desc{font-size:13px;color:var(--f8-grey);}

/* ── Dividers ── */
.divider{height:1px;background:var(--f8-fog);margin:28px 0;}

/* ── Stat strip ── */
.stat-strip{display:flex;background:var(--f8-navy);border-radius:var(--r-lg);overflow:hidden;margin-top:28px;}
.stat-item{flex:1;padding:20px;border-right:1px solid rgba(255,255,255,0.08);}
.stat-item:last-child{border-right:none;}
.stat-num{font-size:26px;font-weight:800;color:var(--f8-blue-bright);letter-spacing:-0.03em;line-height:1;}
.stat-label{font-size:12px;color:rgba(255,255,255,0.6);margin-top:4px;line-height:1.35;}

/* ── App footer ── */
.app-footer{background:var(--f8-navy);color:rgba(255,255,255,0.55);font-size:12px;text-align:center;padding:20px 24px;line-height:1.6;margin-top:auto;}
.app-footer strong{color:rgba(255,255,255,0.78);}

/* ── Utility ── */
.mt8{margin-top:8px;} .mt12{margin-top:12px;} .mt16{margin-top:16px;} .mt20{margin-top:20px;} .mt24{margin-top:24px;} .mt28{margin-top:28px;} .mt32{margin-top:32px;}
.flex{display:flex;} .gap8{gap:8px;} .gap12{gap:12px;} .gap16{gap:16px;}
.items-center{align-items:center;} .justify-between{justify-content:space-between;}
.text-grey{color:var(--f8-grey);} .text-sm{font-size:13px;}
.fw700{font-weight:700;}

/* ── Print styles ── */
@media print{
  .app-shell{display:none!important;}
  #print-document{display:block!important;}
  body{background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  #print-document .print-sec{page-break-inside:avoid;}
}

/* ── Gate overlay ── */
.gate-overlay{position:absolute;inset:0;background:rgba(245,247,250,0.85);border-radius:var(--r-xl);display:flex;align-items:center;justify-content:center;z-index:5;backdrop-filter:blur(2px);}
.gate-pill{background:#fff;border:1.5px solid #d4c8f8;border-radius:40px;padding:10px 20px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-2);}
.gate-pill-text{font-size:13px;font-weight:600;color:var(--f8-purple);}
</style>
</head>

<div id="root"></div>

/**
 * Splits a free-text input into individual points.
 * Handles: newlines, bullets (- • *), numbered lists, semicolons, and sentences.
 * Deduplicated and capped at maxItems.
 */
function splitIntoPoints(text, minLen = 12, maxItems = 6) {
  if (!text || !text.trim()) return [];
  // Normalise bullets/numbers at line start, then split
  const normalised = text
    .replace(/^\s*[\-\•\*\–]\s*/gm, '\n')   // bullets → newline
    .replace(/^\s*\d+[\.\)]\s*/gm, '\n');    // "1." or "1)" → newline
  // Split on newlines and semicolons; also split on sentence boundaries without lookbehind
  const sentenceSplit = normalised.replace(/([a-z\d])\.\s+([A-Z])/g, '$1.\n$2');
  const parts = sentenceSplit
    .split(/[\n;]/)
    .map(s => s.replace(/[.]+$/, '').trim())     // strip trailing periods
    .filter(s => s.length >= minLen);
  // Capitalise first letter, deduplicate, cap
  const seen = new Set();
  const result = [];
  for (const s of parts) {
    const clean = s.charAt(0).toUpperCase() + s.slice(1);
    if (!seen.has(clean.toLowerCase())) { seen.add(clean.toLowerCase()); result.push(clean); }
    if (result.length >= maxItems) break;
  }
  return result;
}

function buildSplit(role) {

    { text: "First-cut content calendars and campaign timelines from a strategic brief", category: "admin" },
    { text: "A/B test result analysis and recommendation memos", category: "analysis" },
  ] : isService ? [
    { text: "Deflect routine inbound queries with AI-powered self-serve and knowledge base", category: "admin" },
    { text: "Draft standard replies to common support tickets from response templates", category: "admin" },
    { text: "CSAT and NPS analysis, ticket trend summaries, and churn-signal dashboards", category: "analysis" },
    { text: "Meeting prep notes from account history and open ticket context", category: "analysis" },
    { text: "First-draft renewal proposals and success plan updates", category: "admin" },
  ] : isOps ? [
    { text: "Pipeline hygiene, deal-stage tracking, and CRM data cleansing", category: "admin" },
    { text: "Forecasting models and revenue dashboards from structured data", category: "analysis" },
    { text: "Process documentation, SOP drafting, and workflow mapping", category: "admin" },
    { text: "Reporting packs for QBRs — pulling, formatting, and summarising data", category: "analysis" },
    { text: "Tool configuration, integration checks, and automation rule management", category: "admin" },
  ] : isStrategy ? [
    { text: "Research briefs on frameworks, benchmarks, and best practice from published sources", category: "analysis" },
    { text: "First-draft communication decks, memos, and stakeholder updates from structured input", category: "admin" },
    { text: "Summarising survey and engagement data into thematic reports", category: "analysis" },
    { text: "Drafting policy and process documentation from agreed principles", category: "admin" },
    { text: "Meeting prep notes, agenda structuring, and post-meeting action summaries", category: "admin" },
  ] : [
    { text: "Research briefs and background documents from published sources", category: "analysis" },
    { text: "First-draft documents, templates, and communications from structured input", category: "admin" },
    { text: "Routine reporting, data summaries, and dashboard population", category: "analysis" },
    { text: "Meeting prep and follow-up notes from available context", category: "admin" },
    { text: "Scheduling, coordination tasks, and administrative workflow management", category: "admin" },

  const baseHuman = isMarketing ? [
    { text: "Positioning and brand judgment — knowing what not to say in this market", category: "judgment" },
    { text: "Campaign strategy — which message, which audience, which moment", category: "judgment" },
    { text: "Agency and partner relationships — trust, briefing quality, accountability", category: "relationship" },
    { text: "Budget ownership and trade-off calls — on the hook when results disappoint", category: "judgment" },
    { text: "Protecting the brand in a small, high-trust market — one misfire lands hard", category: "judgment" },
  ] : isService ? [
    { text: "De-escalation of at-risk accounts — the moment that determines whether they stay", category: "relationship" },
    { text: "Executive-level conversations on renewal risk — judgment, not script", category: "judgment" },
    { text: "Identifying and developing champions inside the customer organisation", category: "relationship" },
    { text: "Owning churn accountability — no AI carries the consequences of a lost account", category: "judgment" },
  ] : isOps ? [
    { text: "Go-to-market process design — translating strategy into operating rhythm", category: "judgment" },
    { text: "Stakeholder alignment — making the case across sales, marketing, finance", category: "relationship" },
    { text: "Prioritisation and trade-off decisions — what gets automated, what doesn't", category: "judgment" },
    { text: "Vendor and tool evaluation — judgment calls that shape the stack for years", category: "judgment" },
  ] : isStrategy ? [
    { text: "Organisational diagnosis — reading what's really going on beneath the stated issue", category: "judgment" },
    { text: "Senior stakeholder influence — building trust and shaping decisions without authority", category: "relationship" },
    { text: "Change design — knowing which levers shift culture and which create noise", category: "judgment" },
    { text: "Ethical judgment — navigating sensitive people situations that carry real consequences", category: "judgment" },
    { text: "Narrative and framing — making complex or unpopular change land with the right audience", category: "judgment" },
  ] : [

    { text: "Stakeholder relationships — the trust that no tool can replicate or substitute", category: "relationship" },
    { text: "Accountability — owning outcomes, not just activities", category: "judgment" },
    { text: "Adaptability — navigating ambiguity and changing priorities without losing direction", category: "judgment" },
    { text: "Internal advocacy — making the case across functions for what matters", category: "relationship" },

  // Inject ALL user glue-work points as separate human work items, then pad with base items
  const glueItems = gluePoints.map(text => ({ text, category: "relationship" }));
  const humanWork = glueItems.length > 0
    ? [...glueItems, ...baseHuman.slice(0, Math.max(2, 5 - glueItems.length))]

        "Named relationships with key stakeholders or accounts",
        "Decision quality at the critical moments — the calls only a person can own",
      ];

  const protect = [
    ...protectLines,
    isMarketing ? "Brand stewardship — positioning calls and what not to publish" :
    isService ? "The loyalty moment — de-escalation of at-risk accounts must be human" :
    "The relationship and the close — trust built over years, not automatable",
    "Anything touching legal exceptions, pricing authority, or personnel decisions",
  ];

  return {
    aiAble: baseAiAble,
    humanWork,
    accountabilities,
    protect,
    caveat: {
      confidence: (role.glueWork && role.glueWork.length > 80) ? "medium-high" : "medium",
      reasons: [
        role.jdText && role.jdText.length > 50

          : "No JD text provided — analysis is based on your team's description only",
        "Glue work and institutional memory may still be under-described",
        ...(isGeneric ? ["Your role didn't match a known function pattern — outputs are intentionally broad. Review and edit before issuing."] : []),
      ],
    },
    isGeneric,
  };
}

      "Tool evaluation: assesses new AI tools for fit and risk — not just capability",
      "Change enablement: helps colleagues adopt AI-assisted workflows without losing process integrity",
    ] : isStrategy ? [

      "Prompt craft: gets useful first-draft communications, policies, and plans from AI tools, then edits for context",
      "Critical review: identifies where AI outputs flatten nuance or miss organisational context",
      "Narrative judgment: knows when to use AI-generated language and when the situation demands original voice",
      "Tool fluency: comfortable evaluating and adopting AI-enabled HR and strategy tools as they mature",

      "AI-assisted drafting: reviews and improves AI-generated documents, communications, and reports",
      "Prompt craft: gets useful, task-specific output from AI tools without engineering skills",
      "Critical review: spots where AI output is generic, incomplete, or context-blind",
      "Tool fluency: adapts as the AI stack changes — learning agility, not just current tools",
      "Workflow integration: incorporates AI assistance into day-to-day work in a way that saves time and maintains quality",
    ],
    humanSkills: split ? split.humanWork.slice(0, 4).map(h => h.text) : [
      "Commercial judgment: reads a situation — when to push, when to wait, when to walk",
      "Accountability: willing to own the target and the outcome — comfortable being on the hook",
      "Resilience: handles setbacks, long cycles, and restructuring customers without de-railing",
      "Internal influence: makes the case for commitments across product, finance, legal",

    caveat: {
      confidence: "medium-high",
      reasons: [
        "Skill balance depends on current team composition — adjust for what's already present",
        "AI tool landscape is changing; re-assess AI skill requirements every 6 months",

  };
}

function Stage3({ state, setState, plan, onNext, onBack }) {
  const [loading, setLoading] = useState(!state.skills);

  const [comments, setComments] = useState(state.comments || []);

  useEffect(() => {
    if (!skills) {
      const t = setTimeout(() => {
        const dynamic = buildSkills(state.role, state.split);
        setSkills(dynamic);
        setState(s => ({ ...s, skills: dynamic }));
        setLoading(false);
      }, 1800);
      return () => clearTimeout(t);
    } else {
      setLoading(false);
    }
  }, []);

  function toggleAi(i) { setAiAccepted(a => ({ ...a, [i]: !a[i] })); }
  function toggleHuman(i) { setHumanAccepted(a => ({ ...a, [i]: !a[i] })); }

  function addComment() {
    if (!comment.trim()) return;
    const c = { text: comment, author: 'Owner', ts: new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' }) };

    setComments(next);
    setState(s => ({ ...s, comments: next, skills, aiSkillsAccepted: aiAccepted, humanSkillsAccepted: humanAccepted }));
    setComment('');

    setState(s => ({ ...s, skills, aiSkillsAccepted: aiAccepted, humanSkillsAccepted: humanAccepted, comments }));
    onNext();

    <div className="page">

          </div>

          {/* AI Skills */}
          <div className="mt24">
            <div className="section-hdr">
              <div className="section-icon-box blue">🤖</div>

              {skills.aiSkills.map((s, i) => (
                <div key={i} className={`skill-item ${aiAccepted[i] ? 'accepted' : ''}`}>
                  <input type="checkbox" id={`ai-${i}`} checked={!!aiAccepted[i]} onChange={() => toggleAi(i)} />

          {/* Human Skills */}

              <div className="section-icon-box green">👤</div>
              <div>
                <div className="section-title">Key Capabilities to be Successful</div>
                <div className="section-desc">What this role is really about. The work only a person can do and own. Tick what's right for this specific role.</div>

            <div className="skill-list">
              {skills.humanSkills.map((s, i) => (
                <div key={i} className={`skill-item ${humanAccepted[i] ? 'accepted' : ''}`}>
                  <input type="checkbox" id={`h-${i}`} checked={!!humanAccepted[i]} onChange={() => toggleHuman(i)} />
                  <label htmlFor={`h-${i}`}>{s}</label>
                </div>
              ))}
            </div>
          </div>

          {/* Premium agent */}
          <div className="mt28">
            <div className={`premium-panel`} style={{ position:'relative' }}>
              <div className="premium-panel-header">
                <span className="premium-panel-icon">✨</span>
                <div>
                  <div className="premium-panel-title">Agent Skill Review</div>

      )}

  );
}

function Stage4({ state, setState, plan, onNext, onBack }) {
  const [loading, setLoading] = useState(!state.jdDraft);
  const [jd, setJd] = useState(state.jdDraft || null);
  const [agentLoading, setAgentLoading] = useState(false);
  const [agentDone, setAgentDone] = useState(state.agentReviewed || false);
  const [showAgent, setShowAgent] = useState(false);

  useEffect(() => {
    if (!jd) {
      const t = setTimeout(() => {
        const draft = MOCK_JD(state.project, state.skills, state.role);
        setJd(draft);
        setState(s => ({ ...s, jdDraft: draft }));
        setLoading(false);
      }, 2600);
      return () => clearTimeout(t);
    } else {
      setLoading(false);
    }
  }, []);

  function runAgent() {
    setAgentLoading(true);
    setTimeout(() => {
      setAgentLoading(false);
      setAgentDone(true);
      setShowAgent(true);
      setState(s => ({ ...s, agentReviewed: true }));
    }, 3000);
  }

  function handleNext() {
    setState(s => ({ ...s, jdDraft: jd, agentReviewed: agentDone }));
    onNext();
  }

  function renderJD(text) {
    if (!text) return null;
    return text.trim().split('\n').map((line, i) => {
      if (line.startsWith('**') && line.endsWith('**') && !line.includes('|')) {
        const content = line.replace(/\*\*/g, '');
        return <h3 key={i}>{content}</h3>;
      }
      if (line.startsWith('*') && line.endsWith('*') && !line.startsWith('**')) {
        return <p key={i} style={{ color:'var(--f8-grey)', fontStyle:'italic', fontSize:13 }}>{line.replace(/\*/g,'')}</p>;
      }
      if (line.startsWith('---')) return <hr key={i} style={{ border:'none', borderTop:'1px solid var(--f8-fog)', margin:'12px 0' }}/>;
      if (line.startsWith('- ')) return <li key={i} style={{ marginBottom: 3 }}>{line.slice(2)}</li>;
      if (line.trim() === '') return <div key={i} style={{ height: 8 }}/>;
      return <p key={i}>{line}</p>;
    });
  }

  return (
    <div className="page">
      <div className="page-eyebrow"><span className="eyebrow-dot"/>Stage 4 of 5</div>
      <h1 className="page-title">Draft the Job Description</h1>
      <p className="page-sub">The JD is built from the real role, the capability split, and the agreed skill sets — not the original posting. Both AI and human sections travel together.</p>

      {loading ? (
        <div className="card mt24">
          <div className="ai-loading">
            <div className="ai-spinner"/>
            <div className="ai-loading-label">Drafting the full JD from your capability analysis…</div>
            <div className="ai-loading-model">Model: {plan === 'premium' ? 'Claude Opus (frontier)' : 'Claude Sonnet'}</div>
          </div>
        </div>
      ) : jd && (
        <>
          {/* JD Preview */}
          <div className="mt24">
            <div className="flex items-center justify-between" style={{ marginBottom: 14 }}>
              <div className="card-title">Job Description Draft</div>
              <button className="btn btn-ghost btn-sm no-print" onClick={() => window.print()}>
                🖨 Print / Export PDF
              </button>
            </div>
            <div className="jd-preview">
              <ul style={{ display:'contents' }}>
                {renderJD(jd)}
              </ul>
            </div>
          </div>

          {/* Premium: Agent Review */}
          <div className="mt28">
            <div className="premium-panel" style={{ position:'relative' }}>
              <div className="premium-panel-header">
                <span className="premium-panel-icon">✨</span>
                <div>
                  <div className="premium-panel-title">Capability Lens Agent — Quality Review</div>
                  <div className="premium-panel-sub">Agent reviews the draft, improves it, and tells you exactly what changed and why. Quality made visible.</div>
                </div>
                <span className="badge badge-premium" style={{ marginLeft:'auto' }}><Star size={9}/>Premium</span>
              </div>

              {plan !== 'premium' ? (
                <div className="gate-pill" style={{ margin:'12px auto 0', width:'fit-content', position:'relative' }}>
                  <Lock size={13}/><span className="gate-pill-text">Upgrade to Premium to unlock Agent JD Review</span>
                </div>
              ) : !agentDone ? (
                <div className="mt12">
                  {agentLoading ? (
                    <div className="ai-loading" style={{ padding: '24px 0' }}>
                      <div className="ai-spinner"/>
                      <div className="ai-loading-label">Agent reviewing the draft…</div>
                      <div className="ai-loading-model">Claude Opus + Capability Lens rules + network patterns</div>
                    </div>
                  ) : (
                    <button className="btn btn-primary btn-sm" onClick={runAgent}>
                      <Star size={11}/> Run Agent Review
                    </button>
                  )}
                </div>
              ) : (
                <div className="mt12">
                  <button
                    className="btn btn-ghost btn-sm"
                    style={{ marginBottom: 12 }}
                    onClick={() => setShowAgent(s => !s)}
                  >
                    {showAgent ? '▲ Hide' : '▼ Show'} Agent Changes ({MOCK_AGENT_CHANGES.length})
                  </button>
                  {showAgent && (
                    <div>
                      <div className="diff-header">
                        <span className="diff-tag before">Raw Draft</span>
                        <span style={{ color:'var(--f8-grey)', fontSize: 12 }}>→</span>
                        <span className="diff-tag after">Agent-Improved</span>
                      </div>
                      {MOCK_AGENT_CHANGES.map((c, i) => (
                        <div key={i} className="diff-change">
                          <div className={`diff-bullet ${c.type}`}>{c.type === 'add' ? '+' : '↻'}</div>
                          <div className="diff-change-text">{c.text}</div>
                        </div>
                      ))}
                      <div className="note note-green" style={{ marginTop: 12 }}>
                        <strong>Agent summary:</strong> 4 improvements. Accountability language strengthened. Caveat format enforced. Skill ordering re-prioritised. Sunset clause added to cover note. The improved version is ready for sign-off.
                      </div>
                    </div>

/* ══════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════ */
const LS_KEY        = 'f8_capability_lens_v1';
const PREMIUM_KEY   = 'f8_capability_lens_premium';
const STRIPE_URL    = 'https://buy.stripe.com/7sY14ncrt8dA4oabyG4F200';
// After payment Stripe redirects to your success URL — append ?session_id={CHECKOUT_SESSION_ID}
// Configure this in Stripe Dashboard → Payment Links → After Payment → Redirect to URL

function loadSaved() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

/**
 * Reads Stripe session_id from URL params, persists premium status,
 * and cleans the URL so refreshing doesn't re-trigger.
 * Returns { isPremium, justUpgraded, sessionId }
 */
function readPremiumStatus() {
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id');       // Stripe Checkout success
  const premiumParam = params.get('premium');       // manual override / test

  if (sessionId || premiumParam === 'true') {
    const record = {
      premium: true,
      sessionId: sessionId || 'manual',
      activatedAt: new Date().toISOString(),
    };
    try { localStorage.setItem(PREMIUM_KEY, JSON.stringify(record)); } catch(e) {}
    // Remove params from URL so reload doesn't re-trigger
    const clean = window.location.pathname + window.location.hash;
    window.history.replaceState({}, '', clean);
    return { isPremium: true, justUpgraded: true, sessionId };
  }

  try {
    const raw = localStorage.getItem(PREMIUM_KEY);
    if (raw) {
      const rec = JSON.parse(raw);
      if (rec?.premium) return { isPremium: true, justUpgraded: false, sessionId: rec.sessionId };
    }
  } catch(e) {}

  return { isPremium: false, justUpgraded: false, sessionId: null };
}

function App() {
  const saved = loadSaved();
  const { isPremium, justUpgraded } = readPremiumStatus();

  const [stage, setStage] = useState(saved?.stage || 0);
  const [plan, setPlan] = useState(isPremium ? 'premium' : 'basic');
  const [showUpgradedBanner, setShowUpgradedBanner] = useState(justUpgraded);
  const [appState, setAppState] = useState(saved?.appState || {
    project: { title: '', isOpen: null, commitmentChecks: {} },
    role: { jdText: '', glueWork: '', accountability: '', protectWork: '' },
    split: null, splitAccepted: {},
    skills: null, aiSkillsAccepted: {}, humanSkillsAccepted: {}, comments: [],
    jdDraft: null, agentReviewed: false,
    disclaimerChecked: false, hrSigned: false, signoffEmail: '', signedAt: null,
  });
  const [showRestoreBanner, setShowRestoreBanner] = useState(!!saved && !justUpgraded);

  // Persist to localStorage whenever state or stage changes
  useEffect(() => {
    try { localStorage.setItem(LS_KEY, JSON.stringify({ stage, appState })); } catch(e) {}
  }, [stage, appState]);

  function clearSession() {
    try { localStorage.removeItem(LS_KEY); } catch(e) {}
    window.location.reload();
  }

  function cancelPremium() {
    if (confirm('Remove Premium access from this browser? You will need to re-purchase to restore it.')) {
      try { localStorage.removeItem(PREMIUM_KEY); } catch(e) {}
      setPlan('basic');
    }
  }

  const maxStage = stage;

  const [printValues, setPrintValues] = useState(null);
  const [shouldPrint, setShouldPrint] = useState(false);

  // Delay print slightly so React can flush state before window.print() blocks
  useEffect(() => {
    if (!shouldPrint) return;
    const t = setTimeout(() => { window.print(); setShouldPrint(false); }, 150);
    return () => clearTimeout(t);
  }, [shouldPrint]);

  function handlePrint(values) {
    setPrintValues(values);
    setShouldPrint(true);
  }

  function next() { setStage(s => Math.min(s + 1, 5)); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  function back() { setStage(s => Math.max(s - 1, 0)); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  function goTo(s) { if (s < stage) { setStage(s); window.scrollTo({ top: 0, behavior: 'smooth' }); } }

  const stageProps = { state: appState, setState: setAppState, plan, onNext: next, onBack: back, onPrint: handlePrint };

  return (
    <>
    <div className="app-shell">
      <AppNav plan={plan} onCancelPremium={cancelPremium} />
      <StageBar stage={stage} maxStage={maxStage} onNavigate={goTo} />

      {/* Payment confirmed banner */}
      {showUpgradedBanner && (
        <div style={{ background:'#0f7a3c', borderBottom:'1px solid #0a5c2d', padding:'12px 24px', display:'flex', alignItems:'center', justifyContent:'space-between', gap:12, fontSize:13 }}>
          <span style={{ color:'#fff' }}>🎉 <strong>Premium activated.</strong> All features are now unlocked — export without branding, multi-language Word output, and Expert Validation.</span>
          <button className="btn btn-ghost btn-sm" style={{ color:'#fff', borderColor:'rgba(255,255,255,0.4)' }} onClick={() => setShowUpgradedBanner(false)}>Dismiss</button>
        </div>
      )}

      {/* Session restore banner */}
      {showRestoreBanner && (
        <div style={{ background:'var(--f8-blue-tint)', borderBottom:'1px solid #b3d8f4', padding:'10px 24px', display:'flex', alignItems:'center', justifyContent:'space-between', gap:12, fontSize:13 }}>
          <span style={{ color:'var(--f8-blue-deep)' }}>🔁 <strong>Session restored{appState.project?.title ? ` — "${appState.project.title}"` : ''}</strong> · Stage {stage}: {['Open It','Capture the Role','Capability Split','Agree Skills','Draft JD','Sign Off'][stage]}. If this isn't your session, click Start fresh.</span>
          <div style={{ display:'flex', gap:8, flexShrink:0 }}>
            <button className="btn btn-ghost btn-sm" onClick={() => setShowRestoreBanner(false)}>Continue</button>
            <button className="btn btn-ghost btn-sm" style={{ color:'var(--f8-red)' }} onClick={clearSession}>Start fresh</button>
          </div>
        </div>
      )}
      <main>
        {stage === 0 && <Stage0 {...stageProps} />}
        {stage === 1 && <Stage1 {...stageProps} />}
        {stage === 2 && <Stage2 {...stageProps} />}
        {stage === 3 && <Stage3 {...stageProps} />}
        {stage === 4 && <Stage4 {...stageProps} />}
        {stage === 5 && <Stage5 {...stageProps} />}
      </main>
      <footer className="app-footer">
        <span style={{ display:'flex', alignItems:'center', gap:10, flexWrap:'wrap' }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true" style={{ flexShrink:0 }}>
            <circle cx="12" cy="12" r="10" stroke="#fff"/>
            <line x1="14.31" y1="8" x2="20.05" y2="17.94" stroke="#fff"/>
            <line x1="9.69" y1="8" x2="21.17" y2="8" stroke="#3FB1F2"/>
            <line x1="7.38" y1="12" x2="13.12" y2="2.06" stroke="#fff"/>
            <line x1="9.69" y1="16" x2="3.95" y2="6.06" stroke="#3FB1F2"/>
            <line x1="14.31" y1="16" x2="2.83" y2="16" stroke="#fff"/>
            <line x1="16.62" y1="12" x2="10.88" y2="21.94" stroke="#3FB1F2"/>
          </svg>
          <strong>Capability Lens · A facilit8 Tool</strong> · Decision-support only — not legal advice. Confirm employment-law questions with counsel in your jurisdiction. The client owns every hiring decision; the lens informs it, it never makes it.
        </span>
      </footer>
    </div>
    <PrintDocument appState={appState} printValues={printValues} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
